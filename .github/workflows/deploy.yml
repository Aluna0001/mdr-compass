name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: aluna0001/mdr-compass

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ghcr.io/${{ env.REPO }}/backend:${{ github.sha }} -t ghcr.io/${{ env.REPO }}/backend:latest .
          docker push ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}
          docker push ghcr.io/${{ env.REPO }}/backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ghcr.io/${{ env.REPO }}/frontend:${{ github.sha }} -t ghcr.io/${{ env.REPO }}/frontend:latest ./frontend
          docker push ghcr.io/${{ env.REPO }}/frontend:${{ github.sha }}
          docker push ghcr.io/${{ env.REPO }}/frontend:latest

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ~/mdr-compass/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/mdr-compass
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f